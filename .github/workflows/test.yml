name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          test -z "$(gofmt -l .)"
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go test race
        run: go test -race ./...
